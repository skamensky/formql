services:
  formula-db:
    image: postgres:16
    container_name: formql-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: formula
      POSTGRES_PASSWORD: formula
      POSTGRES_DB: formula
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formula -d formula"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - formula-db-data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro

  formula-db-ext:
    build:
      context: .
      dockerfile: docker/extension/Dockerfile
    container_name: formql-db-ext
    restart: unless-stopped
    environment:
      POSTGRES_USER: formula
      POSTGRES_PASSWORD: formula
      POSTGRES_DB: formula
      GLIBC_TUNABLES: glibc.rtld.optional_static_tls=2048
    ports:
      - "54330:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formula -d formula"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - formula-db-ext-data:/var/lib/postgresql/data
      - ./docker/extension/init/01-formql-ext.sql:/docker-entrypoint-initdb.d/01-formql-ext.sql:ro

volumes:
  formula-db-data:
  formula-db-ext-data:
